<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>intersections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1618;
      --bg-accent: #183238;
      --text: #f1f2ec;
      --muted: #a8bbb8;
      --line: #b7fff8;
      --card: rgba(255, 255, 255, 0.06);
      --shadow: rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      background:
        radial-gradient(circle at top, rgba(183, 255, 248, 0.12), transparent 32rem),
        linear-gradient(180deg, #112126 0%, var(--bg) 42%, #0a0d0e 100%);
    }

    main {
      width: min(72rem, calc(100vw - 2rem));
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .hero {
      padding: 2rem 0 1rem;
      border-bottom: 1px solid rgba(241, 242, 236, 0.12);
      margin-bottom: 1.5rem;
    }

    .eyebrow {
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 0.35rem 0;
      font-family: "Newsreader", serif;
      font-size: clamp(2.8rem, 9vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .meta {
      color: var(--muted);
      max-width: 42rem;
      line-height: 1.5;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(13rem, 1fr));
      gap: 1rem;
    }

    .item {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(241, 242, 236, 0.08);
      border-radius: 1.4rem;
      padding: 1rem;
      box-shadow: 0 1.25rem 2.5rem var(--shadow);
      backdrop-filter: blur(12px);
    }

    .image-frame {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 1rem;
      background:
        radial-gradient(circle at center, rgba(183, 255, 248, 0.08), transparent 70%),
        rgba(6, 12, 14, 0.95);
      overflow: hidden;
      margin-bottom: 0.9rem;
    }

    .image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(0, 0, 0, 0.35));
    }

    .title {
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .subtitle {
      margin-top: 0.35rem;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status {
      padding: 2rem 0;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      main {
        width: min(72rem, calc(100vw - 1.25rem));
      }

      .hero {
        padding-top: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="eyebrow">signal clusters</div>
      <h1 id="city">intersections</h1>
      <p class="meta" id="meta">Loading the latest generated manifest.</p>
    </section>
    <section class="gallery" id="gallery"></section>
    <p class="status" id="status"></p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const manifestCandidates = [
      params.get("manifest"),
      "./results/data/latest_manifest.json",
    ].filter(Boolean);

    function imageSource(item) {
      if (item.image_path) {
        return `./${item.image_path.replace(/^\.?\//, "")}`;
      }
      return "";
    }

    async function loadManifest() {
      for (const manifestPath of manifestCandidates) {
        try {
          const response = await fetch(manifestPath);
          if (!response.ok) {
            continue;
          }
          const data = await response.json();
          return { data, manifestPath };
        } catch (error) {
          console.debug("manifest load failed", manifestPath, error);
        }
      }
      throw new Error("No manifest could be loaded.");
    }

    function renderGallery({ data, manifestPath }) {
      document.documentElement.style.setProperty("--bg", data.background_color || "#0f1618");
      document.getElementById("city").textContent = data.city || "intersections";

      const generatedAt = data.generated_at
        ? new Date(data.generated_at).toLocaleString()
        : "unknown";
      document.getElementById("meta").textContent =
        `${(data.images || []).length} rendered intersections. Manifest source: ${manifestPath}. Generated: ${generatedAt}.`;

      const gallery = document.getElementById("gallery");
      gallery.innerHTML = (data.images || []).map((item, index) => `
        <article class="item">
          <div class="image-frame">
            <img
              src="${imageSource(item)}"
              alt="${item.roads || `Intersection ${index + 1}`}"
              class="image"
            />
          </div>
          <div class="title">${item.roads || `Intersection ${index + 1}`}</div>
          <div class="subtitle">${item.signal_count || "?"} signals nearby</div>
        </article>
      `).join("");
      document.getElementById("status").textContent = "";
    }

    loadManifest()
      .then(renderGallery)
      .catch((error) => {
        document.getElementById("status").textContent = `${error.message} Generate results with uv run snakemake --cores 1, then reload.`;
      });
  </script>
</body>
</html>
